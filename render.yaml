# Render Blueprint — connects this repo to a free, always-deployed instance.
# Render watches the GitHub repo directly: every push to main rebuilds and
# redeploys automatically, no separate CI step needed. See README.md's
# "Deploying" section for the one-time setup (Render dashboard -> New ->
# Blueprint -> pick this repo).
#
# Free-tier caveat: Render's free web services have no persistent disk, so
# the SQLite file at DATABASE_PATH (leads/alerts/trial state) resets on
# every redeploy and on the periodic restart free instances get. Fine for a
# demo/beta; upgrade to a paid instance + a Render Disk once real customer
# data needs to survive deploys.
services:
  - type: web
    name: crm-scoring
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_PATH
        value: data/app.db
      - key: LOG_FORMAT
        value: json

      # Must list every real origin this backend should accept requests
      # from. Add the storefront domain here once it's bought and pointed
      # at this service.
      - key: CORS_ALLOWED_ORIGINS
        value: https://tsovinar1986.github.io,https://www.crmscoring.com,https://crmscoring.com

      # --- Licensing (this deployment's own trial/license behavior) ---
      - key: LICENSE_REQUIRED
        value: "false"
      - key: TRIAL_DAYS
        value: "3"
      - key: TRIAL_MAX_LEADS_PER_UPLOAD
        value: "10"

      # --- Licensing & billing (seller side — secrets, entered once in the
      # Render dashboard during blueprint setup, never stored in this file
      # or git) ---
      - key: LICENSE_PRIVATE_KEY
        sync: false
      - key: LICENSE_PUBLIC_KEY
        sync: false
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_CLIENT_TOKEN
        sync: false
      - key: PADDLE_ENVIRONMENT
        value: sandbox
      - key: PADDLE_PRICE_ID_MONTHLY
        sync: false
      - key: PADDLE_PRICE_ID_ANNUAL
        sync: false
      - key: LICENSE_VALIDITY_DAYS_MONTHLY
        value: "35"
      - key: LICENSE_VALIDITY_DAYS_ANNUAL
        value: "380"

      # --- Optional integrations (blank = mock fallback, see .env.example) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: APOLLO_API_KEY
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: SALESFORCE_USERNAME
        sync: false
      - key: SALESFORCE_PASSWORD
        sync: false
      - key: SALESFORCE_SECURITY_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
